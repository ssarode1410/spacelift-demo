---
- name: Deploy Node Exporter to ALL instances
  hosts: all
  become: true
  tasks:
    - name: Update apt cache
      apt: update_cache=yes

    - name: Install Node Exporter (Metrics Agent)
      apt:
        name: prometheus-node-exporter
        state: present

    - name: Ensure Node Exporter is running
      systemd:
        name: prometheus-node-exporter
        state: started
        enabled: yes

- name: Deploy Prometheus & Grafana to the FIRST instance only
  hosts: all[0]
  become: true
  tasks:
    - name: Install Prometheus Server
      apt:
        name: prometheus
        state: present

    - name: Dynamically configure Prometheus to scrape all EC2 nodes
      copy:
        dest: /etc/prometheus/prometheus.yml
        content: |
          global:
            scrape_interval: 15s
          scrape_configs:
            - job_name: 'ec2_nodes'
              static_configs:
                - targets:
                  {% for host in groups['all'] %}
                  - '{{ host }}:9100'
                  {% endfor %}
      notify: Restart Prometheus

    - name: Install prerequisite packages for Grafana
      apt:
        name: ['apt-transport-https', 'software-properties-common', 'wget', 'gpg']
        state: present

    - name: Add Grafana GPG key
      apt_key:
        url: https://packages.grafana.com/gpg.key
        state: present

    - name: Add Grafana repository
      apt_repository:
        repo: deb https://packages.grafana.com/oss/deb stable main
        state: present

    - name: Update apt cache after adding repo
      apt: update_cache=yes

    - name: Install Grafana Server
      apt:
        name: grafana
        state: present

    - name: Ensure Grafana is running
      systemd:
        name: grafana-server
        state: started
        enabled: yes

  handlers:
    - name: Restart Prometheus
      systemd:
        name: prometheus
        state: restarted
